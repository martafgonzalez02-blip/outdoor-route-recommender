services:
  mysql:
    image: mysql:8.0
    container_name: outdoor-routes-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-outdoor_routes}
      MYSQL_USER: ${MYSQL_USER:-routes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-routes_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
